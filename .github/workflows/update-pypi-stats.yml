name: Update PyPI Download Stats

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch without-mirrors total and write badge JSON
        run: |
          python3 - <<'EOF'
          import urllib.request
          import json
          import sys

          url = "https://pypistats.org/api/packages/snkv/overall"
          req = urllib.request.Request(url, headers={"User-Agent": "snkv-stats-bot/1.0"})
          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())

          total = sum(
              row["downloads"]
              for row in data["data"]
              if row["category"] == "without_mirrors"
          )

          rounded = (total // 1000) * 1000
          message = f"{rounded:,}+"
          print(f"without-mirrors total: {total}  → badge: {message}")

          badge = {
              "schemaVersion": 1,
              "label": "PyPI Downloads",
              "message": message,
              "color": "brightgreen",
          }

          with open("/tmp/pypi-downloads.json", "w") as f:
              json.dump(badge, f, indent=2)
              f.write("\n")
          EOF

      - name: Publish to badges branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin badges 2>/dev/null || true
          if git rev-parse --verify origin/badges >/dev/null 2>&1; then
            git switch badges
          else
            git switch --orphan badges
            git rm -rf . 2>/dev/null || true
          fi

          cp /tmp/pypi-downloads.json pypi-downloads.json
          git add pypi-downloads.json
          git diff --cached --quiet && echo "No change." && exit 0
          git commit -m "chore: update PyPI download stats (without mirrors) [skip ci]"
          git push origin badges
